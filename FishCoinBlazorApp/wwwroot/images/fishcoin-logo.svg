<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!--<linearGradient id="fishGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>-->
    <linearGradient id="rodGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="coinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Fishing Rod -->
  <g transform="translate(20, 50) rotate(-45)" filter="url(#shadow)">
    <line x1="0" y1="0" x2="100" y2="0" stroke="url(#rodGradient)" stroke-width="6" stroke-linecap="round"/>
    <circle cx="100" cy="0" r="4" fill="url(#rodGradient)"/>
  </g>
  
  <!-- Fish Body --><!--
  <ellipse cx="120" cy="100" rx="35" ry="25" fill="url(#fishGradient)" filter="url(#shadow)"/>
  
  --><!-- Fish Head --><!--
  <circle cx="90" cy="100" r="18" fill="url(#fishGradient)"/>
  
  --><!-- Fish Eye --><!--
  <circle cx="83" cy="96" r="5" fill="#ffffff"/>
  <circle cx="84" cy="96" r="3" fill="#000000"/>
  
  --><!-- Fish Mouth --><!--
  <path d="M 75 100 Q 70 102 75 104" stroke="#1e40af" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  --><!-- Fish Tail --><!--
  <path d="M 155 85 Q 180 70 190 75 Q 185 100 190 125 Q 180 130 155 115 Z" fill="url(#fishGradient)" filter="url(#shadow)"/>
  
  --><!-- Fish Top Fin --><!--
  <path d="M 110 75 Q 115 60 120 75 Z" fill="#2563eb"/>
  
  --><!-- Fish Bottom Fin --><!--
  <path d="M 110 125 Q 115 140 120 125 Z" fill="#2563eb"/>-->
  
  <!-- Golden Coin -->
  <circle cx="140" cy="50" r="18" fill="url(#coinGradient)" filter="url(#shadow)"/>
  
  <!-- Coin Details -->
  <circle cx="140" cy="50" r="16" fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.6"/>
  <text x="140" y="56" font-size="16" font-weight="bold" text-anchor="middle" fill="#92400e">₾</text>
  
  <!-- Fishing Line -->
  <line x1="120" y1="50" x2="130" y2="75" stroke="#fcd34d" stroke-width="2" stroke-dasharray="3,2" opacity="0.8" filter="url(#shadow)"/>
</svg>